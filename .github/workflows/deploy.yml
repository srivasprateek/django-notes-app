name: Django CI (Self Hosted)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          uname -a
          docker --version
          docker compose version

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Show container status
        run: docker compose ps

      - name: Show container logs
        run: docker compose logs web

      - name: Wait for container startup
        run: sleep 20

      - name: Run Django migrations
        run: docker compose exec -T web python manage.py migrate

      - name: Collect static files
        run: docker compose exec -T web python manage.py collectstatic --noinput

      - name: Run tests
        run: docker compose exec -T web python manage.py test

      - name: Stop services
        if: always()
        run: docker compose down